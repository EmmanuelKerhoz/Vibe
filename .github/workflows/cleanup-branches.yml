name: Cleanup Dead Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all dead branches
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const defaultBranch =
              context.payload.repository?.default_branch ??
              (await github.rest.repos.get({ owner, repo })).data.default_branch;
            const openPrRefs = new Set();
            let deleted = 0;
            let skipped = 0;
            let ignored = 0;

            // Collect open PR head branches — always keep these
            for await (const response of github.paginate.iterator(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            })) {
              for (const pr of response.data) {
                if (pr.head.repo?.full_name === `${owner}/${repo}`) {
                  openPrRefs.add(pr.head.ref);
                }
              }
            }

            // Collect branches that have at least one closed (not merged) PR and no open PR.
            // These are abandoned branches — dead even though their tip is not in main.
            const closedUnmergedPrRefs = new Set();
            for await (const response of github.paginate.iterator(github.rest.pulls.list, {
              owner,
              repo,
              state: 'closed',
              per_page: 100,
            })) {
              for (const pr of response.data) {
                if (
                  !pr.merged_at &&
                  pr.head.repo?.full_name === `${owner}/${repo}` &&
                  !openPrRefs.has(pr.head.ref)
                ) {
                  closedUnmergedPrRefs.add(pr.head.ref);
                }
              }
            }

            // Get the default branch HEAD SHA
            const { data: defaultBranchData } = await github.rest.repos.getBranch({
              owner,
              repo,
              branch: defaultBranch,
            });
            const defaultSha = defaultBranchData.commit.sha;

            // Get all branches
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });

            for (const branch of branches) {
              if (branch.name === defaultBranch || branch.protected) {
                console.log(`⊘ Keeping ${branch.name} (default or protected branch)`);
                ignored++;
                continue;
              }

              if (openPrRefs.has(branch.name)) {
                console.log(`⊘ Keeping ${branch.name} (open pull request)`);
                ignored++;
                continue;
              }

              // A branch is fully merged when its tip is an ancestor of the default branch.
              // compareCommits(base=default, head=branch): ahead_by === 0 means branch has
              // no commits that aren't already in the default branch.
              let isMerged = false;
              try {
                const { data: comparison } = await github.rest.repos.compareCommits({
                  owner,
                  repo,
                  base: defaultSha,
                  head: branch.commit.sha,
                });
                isMerged = comparison.ahead_by === 0;
              } catch (error) {
                console.error(`✗ Could not compare ${branch.name}: ${error.message}`);
                ignored++;
                continue;
              }

              // Dead branches: fully merged into default, OR abandoned (closed PR, never merged)
              const isAbandoned = closedUnmergedPrRefs.has(branch.name);
              if (!isMerged && !isAbandoned) {
                console.log(`⊘ Keeping ${branch.name} (has unmerged commits, no closed PR)`);
                ignored++;
                continue;
              }

              const reason = isMerged
                ? `fully merged into ${defaultBranch}`
                : 'abandoned (PR closed without merging)';
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`,
                });
                console.log(`✓ Deleted ${branch.name} (${reason})`);
                deleted++;
              } catch (error) {
                if (error.status === 404 || error.status === 422) {
                  console.log(`⊘ ${branch.name} already deleted`);
                  skipped++;
                } else {
                  console.error(`✗ Failed to delete ${branch.name}: ${error.message}`);
                }
              }
            }
            console.log(`\nSummary: ${deleted} deleted, ${skipped} already gone, ${ignored} kept.`);
