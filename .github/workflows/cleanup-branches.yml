name: Cleanup Merged Branches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branches = [
              'copilot/add-tooltips-to-ui-elements',
              'copilot/remove-obsolete-merged-branches',
              'copilot/restore-lcars-ui-features',
              'copilot/update-adaptation-function-prompts'
            ];
            
            for (const branch of branches) {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch}`,
                });
                console.log(`✓ Deleted ${branch}`);
              } catch (error) {
                if (error.status === 404 || error.status === 422) {
                  console.log(`⊘ ${branch} already deleted`);
                } else {
                  throw error;
                }
              }
            }