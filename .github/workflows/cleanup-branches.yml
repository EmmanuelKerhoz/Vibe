name: Cleanup Dead Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all dead branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const defaultBranch = context.payload.repository.default_branch;
            const openPrRefs = new Set();
            const latestClosedPrByRef = new Map();
            let deleted = 0;
            let skipped = 0;
            let ignored = 0;

            for await (const response of github.paginate.iterator(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            })) {
              for (const pr of response.data) {
                if (pr.head.repo?.full_name === `${owner}/${repo}`) {
                  openPrRefs.add(pr.head.ref);
                }
              }
            }

            for await (const response of github.paginate.iterator(github.rest.pulls.list, {
              owner,
              repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            })) {
              for (const pr of response.data) {
                if (pr.head.repo?.full_name !== `${owner}/${repo}`) continue;
                if (pr.head.ref === defaultBranch) continue;
                if (!latestClosedPrByRef.has(pr.head.ref)) {
                  latestClosedPrByRef.set(pr.head.ref, {
                    sha: pr.head.sha,
                    number: pr.number,
                    merged: Boolean(pr.merged_at),
                  });
                }
              }
            }

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });

            for (const branch of branches) {
              if (branch.name === defaultBranch || branch.protected) {
                console.log(`⊘ Keeping ${branch.name} (default or protected branch)`);
                ignored++;
                continue;
              }

              if (openPrRefs.has(branch.name)) {
                console.log(`⊘ Keeping ${branch.name} (open pull request)`);
                ignored++;
                continue;
              }

              const latestClosedPr = latestClosedPrByRef.get(branch.name);
              if (!latestClosedPr) {
                console.log(`⊘ Keeping ${branch.name} (no closed pull request found)`);
                ignored++;
                continue;
              }

              if (branch.commit?.sha !== latestClosedPr.sha) {
                console.log(`⊘ Keeping ${branch.name} (branch advanced since PR #${latestClosedPr.number} closed)`);
                ignored++;
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`,
                });
                console.log(`✓ Deleted ${branch.name} (${latestClosedPr.merged ? 'merged' : 'closed'} PR #${latestClosedPr.number})`);
                deleted++;
              } catch (error) {
                if (error.status === 404 || error.status === 422) {
                  console.log(`⊘ ${branch.name} already deleted`);
                  skipped++;
                } else {
                  console.error(`✗ Failed to delete ${branch.name}: ${error.message}`);
                }
              }
            }
            console.log(`\nSummary: ${deleted} deleted, ${skipped} already gone, ${ignored} kept.`);
