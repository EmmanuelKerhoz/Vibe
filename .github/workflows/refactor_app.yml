name: Refactor App.tsx
on:
  push:
    branches:
      - refactor/split-editor-components

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Refactor script
        run: |
          cat << 'EOF' > refactor.py
          import re
          with open('src/App.tsx', 'r') as f:
              content = f.read()

          # 1. Interfaces
          content = re.sub(r'interface Line \{.*?\}\n\n', '', content, flags=re.DOTALL)
          content = re.sub(r'interface Section \{.*?\}\n\n', '', content, flags=re.DOTALL)
          content = re.sub(r'interface SongVersion \{.*?\}\n\n', '', content, flags=re.DOTALL)

          # 2. Components
          content = re.sub(r'const Label = \(\{ children \}: \{ children: React\.ReactNode \}\) => \{.*?\n};\n\n', '', content, flags=re.DOTALL)
          content = re.sub(r'const Input = \(\{ color, \.\.\.props \}: any\) => \{.*?\n};\n\n', '', content, flags=re.DOTALL)
          content = re.sub(r'const Select = \(\{ color, \.\.\.props \}: any\) => \{.*?\n};\n\n', '', content, flags=re.DOTALL)
          content = re.sub(r'const Button = \(\{ children, variant, color, size, startIcon, sx, component, fullWidth, className, style, \.\.\.props \}: any\) => \{.*?\n};\n\n', '', content, flags=re.DOTALL)
          content = re.sub(r'const Tooltip = \(\{ title, children \}: \{ title: string, children: React\.ReactElement \}\) => \{.*?\n};\n\n', '', content, flags=re.DOTALL)
          content = re.sub(r'const MenuItem = \(\{ children, value, \.\.\.props \}: any\) => \(\n.*?</option>\n\);\n\n', '', content, flags=re.DOTALL)
          content = re.sub(r'const IconButton = \(\{ children, \.\.\.props \}: any\) => \(\n.*?</Button>\n\);\n\n', '', content, flags=re.DOTALL)

          # 3. Add imports
          imports = """import { Line, Section, SongVersion } from './types';
          import { Label } from './components/ui/Label';
          import { Input } from './components/ui/Input';
          import { Select } from './components/ui/Select';
          import { Button } from './components/ui/Button';
          import { Tooltip } from './components/ui/Tooltip';
          import { MenuItem } from './components/ui/MenuItem';
          import { IconButton } from './components/ui/IconButton';"""
          
          parts = content.split('\n')
          for i, line in enumerate(parts):
              if "from '@fluentui/react-components';" in line:
                  parts.insert(i + 1, '\n' + imports)
                  break
          content = '\n'.join(parts)

          # 4. Replace SelectMui typo
          content = content.replace('</SelectMui>', '</Select>')

          with open('src/App.tsx', 'w') as f:
              f.write(content)
          EOF
          python3 refactor.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "Refactor: update App.tsx to use extracted components" || echo "No changes"
          git push
