name: Apply App.tsx Phase1+2 refactor

on:
  push:
    branches:
      - refactor/auto-split-phase1

permissions:
  contents: write

concurrency:
  group: app-refactor-phase1
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply refactor script
        run: node scripts/refactor_app.js

      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "refactor-bot"
            git config user.email "refactor-bot@users.noreply.github.com"
            git add src/App.tsx
            git commit -m "chore(refactor): apply Phase 1+2 split to App.tsx [bot]"
            git push
          else
            echo "No changes to commit."
          fi
