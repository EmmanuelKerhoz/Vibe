<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0a0a1a"/>
  <!-- LCARS amber accent bar left -->
  <rect x="48" y="48" width="48" height="416" rx="24" fill="#CC8800"/>
  <!-- LCARS top bar -->
  <rect x="120" y="48" width="344" height="48" rx="16" fill="#CC8800"/>
  <!-- LCARS bottom bar -->
  <rect x="120" y="416" width="344" height="48" rx="16" fill="#9999FF"/>
  <!-- V letter - VIBE wordmark -->
  <text x="256" y="310" font-family="monospace" font-size="180" font-weight="bold" fill="#CC8800" text-anchor="middle" dominant-baseline="middle" letter-spacing="-8">V</text>
  <!-- Subtle scanline accent -->
  <rect x="120" y="140" width="240" height="4" rx="2" fill="#CC8800" opacity="0.4"/>
  <rect x="120" y="160" width="180" height="4" rx="2" fill="#9999FF" opacity="0.3"/>
  <rect x="120" y="180" width="200" height="4" rx="2" fill="#CC8800" opacity="0.2"/>
</svg>
